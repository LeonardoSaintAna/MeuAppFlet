name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"

      - name: Forçar modo não interativo
        run: echo "FLET_FORCE_NON_INTERACTIVE=1" >> $GITHUB_ENV

      # 🔥 IMPORTANTE: corrigido aqui
      - name: Build APK
        run: |
          flet build apk \
            --source . \
            --verbose \
            --yes

      - name: Listar arquivos gerados
        run: |
          find build -type f || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartHome-APK
          path: build/apk/*.apk
          if-no-files-found: error
