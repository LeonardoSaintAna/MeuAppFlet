name: Build APK (Flet)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Flet
        run: pip install flet

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Forçar modo não interativo
        run: echo "FLET_FORCE_NON_INTERACTIVE=1" >> $GITHUB_ENV

      - name: Build APK
        run: flet build apk --module-name teste --yes --verbose --no-analytics

      - name: Verificar arquivos gerados
        run: ls -R build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/apk/*.apk
