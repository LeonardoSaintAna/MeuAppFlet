name: Build APK (Flet Debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Flet
        run: pip install flet

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Build APK
        run: flet build apk --module-name teste --yes --verbose --no-analytics

      - name: Procurar APK (DEBUG)
        run: find . -name "*.apk"
