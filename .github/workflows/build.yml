name: Build APK (Flet)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências Python
        run: pip install flet

      - name: Instalar Flutter FIXO
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Gerar projeto Flutter via Flet
        run: flet build apk --module-name teste --verbose --no-analytics

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/apk/*.apk
